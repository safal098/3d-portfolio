name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write  # Minimal required permissions [[40]]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '18' }
      
      - run: npm ci && npm run build
      
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4  # Uses auto GITHUB_TOKEN [[43]]
